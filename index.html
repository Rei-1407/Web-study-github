<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Học GitHub cho dự án Unreal Engine</title>
  <meta name="description" content="Hệ thống học và luyện tập GitHub cho dự án Unreal Engine — bài học, quiz và thử thách gõ lệnh." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236c47ff'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white'%3E⌥%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Ẩn/hiện menu">☰</button>

  <aside class="sidebar" id="sidebar">
    <a class="brand" href="#/">
      <span class="brand-mark">⌥</span>
      <span class="brand-text">
        <strong>Git cho Unreal</strong>
        <small>Học &amp; luyện tập nội bộ</small>
      </span>
    </a>

    <div class="sidebar-progress" id="sidebar-progress">
      <!-- filled by app.js -->
    </div>

    <nav class="nav" id="nav" aria-label="Danh sách bài học">
      <!-- filled by app.js -->
    </nav>

    <div class="sidebar-footer">
      <button id="reset-progress" class="link-btn" title="Xóa toàn bộ tiến độ đã lưu">↺ Đặt lại tiến độ</button>
    </div>
  </aside>

  <main class="main" id="main">
    <header class="topbar">
      <div class="crumb" id="crumb"></div>
      <div class="topbar-actions">
        <div class="xp-chip" id="xp-chip" title="Điểm kinh nghiệm">
          <span class="xp-level" id="xp-level">Lv 1</span>
          <span class="xp-val" id="xp-val">0 XP</span>
        </div>
        <button id="theme-toggle" class="icon-btn" title="Chế độ sáng/tối" aria-label="Đổi giao diện sáng/tối">🌙</button>
      </div>
    </header>

    <div class="content" id="content" tabindex="-1">
      <!-- routed view rendered here -->
    </div>

    <footer class="page-nav" id="page-nav"><!-- prev / next --></footer>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <!-- data + libs (order matters) -->
  <script src="assets/js/content-data.js"></script>
  <script src="assets/js/lessons-meta.js"></script>
  <script src="assets/js/quiz-data.js"></script>
  <script src="assets/js/challenge-data.js"></script>
  <script src="assets/vendor/highlight.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
